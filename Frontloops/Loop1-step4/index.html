<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Loop 1 - Step 4</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700" rel="stylesheet">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css" integrity="sha384-50oBUHEmvpQ+1lW4y57PTFmhCaXp0ML5d60M1M7uH2+nqUivzIebhndOJK28anvf" crossorigin="anonymous">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="container">

    <div class="header-chat">
      <span class="user">Mark Zuckerberg</span>
      <a href="#" class="close">
        <img src="img/close.svg" alt="Cerrar" class="close-img">
      </a>
    </div>
  
    <div class="chat">
      <div class="date">
        <hr class="divider-line">
        <span class="date-text">Today</span>
      </div>

      <div class="message-send clearfix">
        <div class="time">10:53</div>
        <div class="text">Hi Mark! I made a new desing for Messenger App.</div>
      </div>


      <div class="message-received clearfix">  
        <div class="time">10:57</div>
        <div class="text">Yo! Send it to my assistant and we'll review it during the year</div>
      </div>

      <div class="message-send clearfix">
        <div class="time">11:03</div>
        <div class="text">But Mark...</div>
      </div>

      <div class="message-alert-danger clearfix">
        <div class="text">You were blocked by the user.</div>
      </div>

      <hr class="chat-divider">

      <div class="message">
        <form action="">
          <input type="text" name="message-body" class="chat-input" placeholder="Enter your message">
          <button type="submit" class="chat-button">Send</button>
        </form>
      </div>
    </div>


  </div>
</body>
</html>
