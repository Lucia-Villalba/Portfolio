<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Loop 1 - Step 2</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  
  <form class="form">

    <h3>payment method</h3>

    <div class="radio">
      <input type="radio" name="payment" value="visa" id="visa">
      <label for="visa">
        <img src="img/visa.svg" alt="Tarjeta Visa">
        <span>visa</span>
        <img src="img/check.svg" alt="Check" class="check">

      </label>
    </div>

    <div class="radio">
      <input type="radio" name="payment" value="masterCard" id="masterCard">
      <label for="masterCard">
        <img src="img/mastercard.svg" alt="Tarjeta Master Card">
        <span>master card</span>
        <img src="img/check.svg" alt="Check" class="check">
      </label>
    </div>

    <div class="radio">
      <input type="radio" name="payment" value="maestro" id="maestro">
      <label for="maestro">
        <img src="img/maestro.svg" alt="Tarjeta Maestro">
        <span>maestro</span>
        <img src="img/check.svg" alt="Check" class="check">
      </label>
    </div>

    <button>next step →</button>
  </form>
</body>
</html>
