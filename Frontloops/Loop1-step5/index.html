<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Loop 1 - Step 5</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Prompt:900" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="container">
    <div class="cities">
      <div class="city-from">
        <div class="city-name-short">fra</div>
        <div class="city-name-full">frankfurt</div>
      </div>
      <div class="city-to">
        <div class="city-name-short">ams</div>
        <div class="city-name-full">amsterdam</div>
      </div>
    </div>
    <div class="ticket-details-1">
      <div class="ticket-info">
        <div class="label">flight</div>
        <div class="value">815</div>
      </div>
      <div class="ticket-info">
        <div class="label">gate</div>
        <div class="value">23g</div>
      </div>
      <div class="ticket-info">
        <div class="label">seat</div>
        <div class="value">10f</div>
      </div>
    </div>
    <div class="ticket-details-2">
      <div class="ticket-info">
        <div class="label">passenger</div>
        <div class="value">robert de niro</div>
      </div>
      <div class="ticket-info">
        <div class="label">class</div>
        <div class="value">business</div>
      </div>
      <div class="ticket-info">
        <div class="label">departure</div>
        <div class="value">3:45am, dec 15</div>
      </div>
      <div class="qr">
        <img src="img/qr.svg" alt="">
      </div>
    </div>
  </div>
</body>
</html>
